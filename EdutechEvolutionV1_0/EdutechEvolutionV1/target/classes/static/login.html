<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: cadetblue; 
      font-family: 'Segoe UI', sans-serif;
      color: #333;
      animation: fadeIn 0.8s ease-in-out;
    }

    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 400px;
      margin-top: 10%;
      padding: 2rem;
      background: navajowhite;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    h2 {
      color: #333;
      margin-bottom: 1.5rem;
      font-weight: bold;
    }

    .form-control {
      border-radius: 12px;
      padding: 10px 15px;
      border: 1px solid #ddd;
      background-color: #f5f5f5;
    }

    .btn-primary {
      background-color: #007bff;
      border: none;
      padding: 12px 0;
      border-radius: 12px;
      font-size: 1.1rem;
    }

    .btn-primary:hover {
      background-color: #0056b3;
    }

    .form-control:focus {
      border-color: #007bff;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }

    .text-decoration-none {
      color: #007bff;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .text-decoration-none:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>
  <div class="container text-center">
    <h2 class="mb-4">Iniciar Sesión</h2>
    <input id="email" class="form-control mb-3" placeholder="Correo" />
    <input id="password" class="form-control mb-3" placeholder="Contraseña" type="password" />
    <button onclick="login()" class="btn btn-primary w-100 mb-2">Ingresar</button>
    <a href="registro.html" class="d-block mt-2 text-decoration-none">¿No tienes cuenta? Regístrate</a>

    <form id="redirectForm" method="GET" action="index.html" style="display:none;">
      <input type="hidden" name="nombre" id="nombre">
    </form>
  </div>

  <script src="js/app_lo.js"></script>
</body>
</html>
