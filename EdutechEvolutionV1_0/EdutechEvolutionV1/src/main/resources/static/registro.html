<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-image: url('https://images.unsplash.com/photo-1589996575384-7ed5039a8b29'); /* Fondo de un árbol de cerezos */
      background-size: cover;
      background-position: center center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 400px;
      margin-top: 10%;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    h2 {
      color: #333;
      margin-bottom: 1.5rem;
      font-weight: bold;
    }

    .form-control {
      border-radius: 12px;
      padding: 10px 15px;
      border: 1px solid #ddd;
      background-color: #f5f5f5;
    }

    .btn-success {
      background-color: #28a745;
      border: none;
      padding: 12px 0;
      border-radius: 12px;
      font-size: 1.1rem;
    }

    .btn-success:hover {
      background-color: #218838;
    }

    .form-control:focus {
      border-color: #28a745;
      box-shadow: 0 0 5px rgba(40, 167, 69, 0.5);
    }
  </style>
</head>
<body>
  <div class="container text-center">
    <h2 class="mb-4">Registro</h2>
    <input id="nombre" class="form-control mb-3" placeholder="Nombre" />
    <input id="email" class="form-control mb-3" placeholder="Correo" />
    <input id="password" class="form-control mb-3" placeholder="Contraseña" type="password" />
    <button onclick="registrar()" class="btn btn-success w-100">Registrar</button>
  </div>

  <script src="js/app_reg.js"></script>
</body>
</html>
