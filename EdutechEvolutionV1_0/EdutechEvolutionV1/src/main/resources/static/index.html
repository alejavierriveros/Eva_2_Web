<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duoc Cursos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-image: url('https://images.unsplash.com/photo-1589996575384-7ed5039a8b29'); 
      background-size: cover;
      background-position: center center;
      color: #f1f1f1;
      font-family: 'Segoe UI', sans-serif;
    }

    
    .card-container {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    .card-header {
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 20px;
      color: #1d9d76;
      font-weight: bold;
    }

    .input-field, .form-control, .btn-custom {
      background-color: #262626 !important;
      border: 1px solid #333 !important;
      color: #f1f1f1;
    }

    .btn-custom {
      border-radius: 30px;
      padding: 12px 25px;
      font-size: 1rem;
    }

    .table {
      margin-top: 20px;
    }

    .table th, .table td {
      background-color: #333 !important;
      color: #f1f1f1 !important;
    }

    .table th {
      color: #1d9d76;
      font-weight: bold;
    }

    
    .btn-primary {
      background-color: #007bff;
      border: none;
    }

    .btn-danger {
      background-color: #e74c3c;
      border: none;
    }

    .btn-outline-light {
      border: 1px solid #fff;
      color: #fff;
    }

    .btn-outline-light:hover {
      background-color: #fff;
      color: #1d9d76;
    }

    .btn-success {
      background-color: #2ecc71;
      border: none;
    }

    .btn-success:hover {
      background-color: #27ae60;
    }

    .btn-outline-danger {
      border: 1px solid #e74c3c;
      color: #e74c3c;
    }

    .btn-outline-danger:hover {
      background-color: #e74c3c;
      color: #fff;
    }

  </style>
</head>
<body>

  
  <div class="text-center py-5 bg-dark text-white">
    <h1 class="display-4 fw-bold">🎓 DUOC - Cursos Interactivos</h1>
    <p class="lead">Administra y adquiere cursos como nunca antes</p>
    <button onclick="cerrarSesion()" class="btn btn-outline-danger btn-custom mt-3">Cerrar sesión</button>
  </div>

  
  <div class="container my-5">
    <div class="card-container">
      <h2 class="card-header">➕ Crear Nuevo Curso</h2>
      <div class="row g-3">
        <div class="col-md-4"><input class="form-control input-field" type="text" id="nombre" placeholder="Nombre" /></div>
        <div class="col-md-4"><input class="form-control input-field" type="text" id="descripcion" placeholder="Descripción" /></div>
        <div class="col-md-4"><input class="form-control input-field" type="text" id="seccion" placeholder="Sección" /></div>
      </div>
      <div class="row g-3 mt-2">
        <div class="col-md-4"><input class="form-control input-field" type="date" id="fechaInicio" placeholder="Fecha de inicio" /></div>
        <div class="col-md-4"><input class="form-control input-field" type="number" id="cupos" placeholder="Cupos" /></div>
        <div class="col-md-4"><input class="form-control input-field" type="number" id="precio" placeholder="Precio" /></div>
      </div>
      <div class="text-center mt-4">
        <button class="btn btn-success btn-custom" onclick="agregarCurso()">Agregar Curso</button>
      </div>
    </div>
  </div>

  
  <div class="container mb-5">
    <div class="card-container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="card-header">📚 Cursos Disponibles</h2>
        <button class="btn btn-outline-light btn-custom" onclick="listarCursos()">🔄 Refrescar</button>
      </div>
      <div class="table-responsive">
        <table class="table table-bordered text-center" id="tablaCursos">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Inicio</th>
              <th>Cupos</th>
              <th>Sección</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  
  <div class="container mb-5">
    <div class="card-container">
      <h2 class="card-header">🛒 Carrito de Cursos</h2>
      <div class="mb-3">
        <button class="btn btn-danger btn-custom me-2" onclick="vaciarCarrito()">🗑 Vaciar</button>
        <button class="btn btn-primary btn-custom" onclick="carrito.confirmarCompra()">💳 Comprar</button>
      </div>
      <div class="table-responsive">
        <table class="table table-bordered text-center" id="tablaCarrito">
          <thead class="table-secondary">
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Sección</th>
              <th>Eliminar</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="mt-3">Total en carrito: <strong><span id="totalCarrito">0</span></strong></p>
    </div>
  </div>

  
  <script src="js/app_in.js"></script>
</body>
</html>
